  <!-- React 應用程式掛載點 -->

  <!-- 應用程式邏輯 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      User, Layout, ChevronLeft, Plus, Trash2, X,
      Target, Info, ChevronDown, ChevronUp, Download, 
      Users, FileText, Eye, EyeOff, Radar as RadarIcon, CheckCircle2, GitMerge, Loader2, Edit2,
      GripVertical, ArrowDownAZ, Clock, Settings2, Sparkles, BarChart2
    } from 'lucide-react';
    import { 
      Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, 
      ResponsiveContainer, Tooltip, Legend 
    } from 'recharts';
    
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot, writeBatch } from 'firebase/firestore';

    const YOUR_FIREBASE_CONFIG = {
      apiKey: "AIzaSyAk4NOwJKyVMefIi77gh4pnyevJda5HkH0",
      authDomain: "techart-design-quality-list.firebaseapp.com",
      projectId: "techart-design-quality-list",
      storageBucket: "techart-design-quality-list.firebasestorage.app",
      messagingSenderId: "429057781194",
      appId: "1:429057781194:web:68bb237d0473246230f333",
      measurementId: "G-HK2XRHB859"
    };

    const app = initializeApp(YOUR_FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const getProjectsCollectionRef = () => {
      return collection(db, 'projects');
    };

    const DIMENSIONS = [
      { 
        key: 'clarity', label: '需求釐清精準度', shortLabel: '需求釐清',
        core: '找出真正的解法，不當盲目加番茄醬的「手」。找出深層心理需求，或許改成「咖哩烏龍麵」才是最佳解。',
        levels: {
          1: { title: '純加番茄醬', desc: '客戶說什麼就畫什麼，連自己都覺得不合理。' },
          2: { title: '番茄醬擺得很漂亮', desc: '照著表層需求做，但沒有重新思考真正的問題。' },
          3: { title: '開始懷疑味道', desc: '察覺要求有矛盾，但還沒提出完整的最佳解法。' },
          4: { title: '改成咖哩烏龍麵', desc: '抓出客戶真正的目的，提出對症下藥的設計解法。' },
          5: { title: '煮出他沒說出口的味道', desc: '不僅提出正確解法，還完全讀懂決策者的喜好。' }
        }
      },
      { 
        key: 'architecture', label: '概念結構完整度', shortLabel: '概念結構',
        core: '一句話測試！你的設計背後有沒有骨幹？必須要有一個核心敘事軸。',
        levels: {
          1: { title: '純靈感拼貼', desc: '只是好看的畫面集合，沒有主軸。' },
          2: { title: '有初步分類', desc: '畫面有針對企劃內容做歸納，但邏輯關係薄弱。' },
          3: { title: '具備基礎概念', desc: '有個大方向，但還沒辦法用「一句話」清楚表達。' },
          4: { title: '邏輯推演順暢', desc: '能用一句話說出主軸，並解釋每個元素存在的原因。' },
          5: { title: '擁有超強核心支點', desc: '80%以上成員可清楚複述邏輯，所有元素對應主軸。' }
        }
      },
      { 
        key: 'differentiation', label: '專屬差異化程度', shortLabel: '專屬差異',
        core: '換 LOGO 測試！這個設計具備不可替代性嗎？',
        levels: {
          1: { title: '模板素材直用', desc: '什麼主題都能用，換了 LOGO 和主題也毫無違和感。' },
          2: { title: '素材優化拼接', desc: '拿現有常見的展覽套路、設計素材稍微修改拼湊。' },
          3: { title: '部分專屬元素', desc: '畫面中有客製化細節，但相似主題還是能套用。' },
          4: { title: '具有專屬結構', desc: '整體空間或視覺能看出是為該客戶量身打造的。' },
          5: { title: '完全專屬配置', desc: '只有這品牌這場域能用，具備極高的專屬差異化。' }
        }
      },
      { 
        key: 'amplification', label: '視覺放大能力', shortLabel: '視覺放大',
        core: '視覺不只是裝飾，而是「放大器」，讓概念變清楚、變有力、被記住。',
        levels: {
          1: { title: '花拳繡腿', desc: '過度裝飾，導致視覺效果模糊了概念，喧賓奪主。' },
          2: { title: '視覺美但偏離主軸', desc: '畫面精緻漂亮，但跟背後的概念關聯薄弱。' },
          3: { title: '視覺符合概念', desc: '視覺與概念有一致性，但未形成強烈記憶點。' },
          4: { title: '視覺有效強化概念', desc: '視覺成功讓概念變得更好懂、增加說服力。' },
          5: { title: '視覺成為絕對記憶點', desc: '存在一個清晰可辨識的核心視覺符號，成為識別點。' }
        }
      },
      { 
        key: 'feasibility', label: '可執行與風險控制', shortLabel: '風險控制',
        core: '高品質設計不只在於概念強，而是在預算、時間壓力下，仍然能維持品質。',
        levels: {
          1: { title: '只存在概念中', desc: '未考慮預算、工期，概念無法在現實條件下實現。' },
          2: { title: '高風險賭注', desc: '理論可行，缺乏成本估算，可能導致成本超標。' },
          3: { title: '基本可落地', desc: '實務上做得出來，但可能還沒仔細精算過最佳解。' },
          4: { title: '優質的方案', desc: '設計當下已將預算限制與時間壓力納入規劃。' },
          5: { title: '限制中創造優勢', desc: '主動調整產出策略，用聰明方式使限制成為優勢。' }
        }
      }
    ];

    const MEMBERS = [
      { id: 'm1', name: '慧修', color: '#9f1239' }, 
      { id: 'm2', name: 'PM', color: '#0369a1' }, 
      { id: 'm3', name: '阿寬', color: '#15803d' }, 
      { id: 'm4', name: '浩偉', color: '#6b21a8' }, 
      { id: 'm5', name: '阿涵', color: '#b45309' }, 
      { id: 'm6', name: '51', color: '#be185d' },   
      { id: 'm7', name: 'Edward', color: '#1d4ed8' },
      { id: 'm8', name: '耀中', color: '#0f766e' }, 
      { id: 'm9', name: 'Ray', color: '#a16207' }   
    ];

    const INITIAL_PROJECTS = [
      {
        id: 'p1',
        name: '金融科技特展',
        description: '為年度金融創新展覽打造的整體展區與視覺體驗。透過古典與現代的語彙交錯，呈現數據的溫度。',
        evaluations: [],
        subItems: [
          { id: 's1', name: '主視覺海報', evaluations: [] },
          { id: 's2', name: '互動體驗機台', evaluations: [] }
        ],
        order: 0
      }
    ];

    const getProjectMainRadarData = (project) => {
      const evals = project.evaluations || [];
      const dimAverages = {};
      DIMENSIONS.forEach(dim => {
        const sum = evals.reduce((acc, curr) => acc + (curr.scores && curr.scores[dim.key] ? curr.scores[dim.key] : 0), 0);
        dimAverages[dim.key] = evals.length > 0 ? Number((sum / evals.length).toFixed(1)) : 0;
      });
      return DIMENSIONS.map(dim => ({
        subject: dim.shortLabel,
        fullMark: 5,
        average: dimAverages[dim.key]
      }));
    };

    const getProjectAlignmentData = (project) => {
      return DIMENSIONS.map(dim => {
        const mainEvals = project.evaluations || [];
        const mainSum = mainEvals.reduce((acc, curr) => acc + (curr.scores?.[dim.key] || 0), 0);
        const mainAvg = mainEvals.length > 0 ? (mainSum / mainEvals.length) : 0;
        const subItems = project.subItems || [];
        let subSum = 0;
        let subEvalCount = 0;
        subItems.forEach(sub => {
          const sEvals = sub.evaluations || [];
          sEvals.forEach(e => {
            if (e.scores && e.scores[dim.key]) {
              subSum += e.scores[dim.key];
              subEvalCount++;
            }
          });
        });
        const subAvg = subEvalCount > 0 ? (subSum / subEvalCount) : 0;
        return {
          subject: dim.shortLabel,
          mainProject: Number(mainAvg.toFixed(1)),
          subItemsAverage: Number(subAvg.toFixed(1)),
          fullMark: 5
        };
      });
    };


    function App() {
      const [user, setUser] = useState(null);
      const [loadingDb, setLoadingDb] = useState(true);
      const [currentMemberId, setCurrentMemberId] = useState(null); 
      const [projects, setProjects] = useState([]); 
      const [selectedProjectId, setSelectedProjectId] = useState(null); 
      const [activeItemId, setActiveItemId] = useState('main'); 
      const [isAddingProject, setIsAddingProject] = useState(false);
      const [showAllMembers, setShowAllMembers] = useState(false); 
      const [expandedRubrics, setExpandedRubrics] = useState({});
      const [newProject, setNewProject] = useState({ name: '', description: '' });
      const [deletingId, setDeletingId] = useState(null); 
      const [isAddingSubItem, setIsAddingSubItem] = useState(false); 
      const [newSubItemName, setNewSubItemName] = useState(''); 
      const [draftScores, setDraftScores] = useState({});
      const [isEditingProject, setIsEditingProject] = useState(false);
      const [editProjectData, setEditProjectData] = useState({ name: '', description: '' });
      const [deletingSubItemId, setDeletingSubItemId] = useState(null);
      const [sortMethod, setSortMethod] = useState('date'); 
      const [draggedIndex, setDraggedIndex] = useState(null);
      const [dragOverIndex, setDragOverIndex] = useState(null);
      const [isOverviewMode, setIsOverviewMode] = useState(false);

      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } catch (error) { console.error("Auth error:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const projectsRef = getProjectsCollectionRef();
        const unsubscribe = onSnapshot(projectsRef, (snapshot) => {
          if (snapshot.empty && projects.length === 0 && loadingDb) {
            INITIAL_PROJECTS.forEach(async (p) => {
              try { await setDoc(doc(projectsRef, p.id), p); } catch(e) {}
            });
          } else {
            const fetchedProjects = snapshot.docs.map(document => ({ id: document.id, ...document.data() }));
            setProjects(fetchedProjects);
            setLoadingDb(false);
          }
        }, (error) => {
          console.error("Firestore error:", error);
          setLoadingDb(false);
        });
        return () => unsubscribe();
      }, [user]);

      const isAdmin = currentMemberId === 'm2' || currentMemberId === 'm3';

      const sortedProjects = useMemo(() => {
        let list = [...projects];
        if (sortMethod === 'date') list.sort((a, b) => b.id.localeCompare(a.id));
        else if (sortMethod === 'name') list.sort((a, b) => a.name.localeCompare(b.name));
        else if (sortMethod === 'manual') {
          list.sort((a, b) => {
            const orderA = a.order !== undefined ? a.order : Number.MAX_SAFE_INTEGER;
            const orderB = b.order !== undefined ? b.order : Number.MAX_SAFE_INTEGER;
            return orderA - orderB;
          });
        }
        return list;
      }, [projects, sortMethod]);

      const currentMemberInfo = useMemo(() => MEMBERS.find(m => m.id === currentMemberId) || MEMBERS[0], [currentMemberId]);
      const selectedProject = useMemo(() => projects.find(p => p.id === selectedProjectId) || null, [projects, selectedProjectId]);

      const activeItem = useMemo(() => {
        if (!selectedProject) return null;
        if (activeItemId === 'main') return selectedProject;
        const subItems = selectedProject.subItems || [];
        const foundSub = subItems.find(sub => sub.id === activeItemId);
        return foundSub ? foundSub : selectedProject;
      }, [selectedProject, activeItemId]);

      useEffect(() => {
        if (activeItem && currentMemberId) {
          const existingEval = (activeItem.evaluations || []).find(e => e.memberId === currentMemberId);
          if (existingEval && existingEval.scores) setDraftScores({ ...existingEval.scores });
          else setDraftScores({});
        }
      }, [activeItem, currentMemberId]);

      const isDraftComplete = useMemo(() => DIMENSIONS.every(dim => (draftScores[dim.key] || 0) > 0), [draftScores]);

      const hasUnsavedChanges = useMemo(() => {
        const existingEval = (activeItem?.evaluations || []).find(e => e.memberId === currentMemberId);
        const existingScores = existingEval ? existingEval.scores : {};
        return DIMENSIONS.some(dim => (existingScores[dim.key] || 0) !== (draftScores[dim.key] || 0));
      }, [activeItem, currentMemberId, draftScores]);

      const aggregatedScores = useMemo(() => {
        if (!activeItem) return null;
        const dimAverages = {};
        let totalAverageScore = 0;
        const evals = activeItem.evaluations || [];
        DIMENSIONS.forEach(dim => {
          const sum = evals.reduce((acc, curr) => acc + ((curr.scores && curr.scores[dim.key]) ? curr.scores[dim.key] : 0), 0);
          const avg = evals.length > 0 ? (sum / evals.length) : 0;
          dimAverages[dim.key] = Number(avg.toFixed(1));
          totalAverageScore += avg;
        });
        return { averages: dimAverages, total: Number(totalAverageScore.toFixed(1)) };
      }, [activeItem]);

      const radarData = useMemo(() => {
        if (!activeItem || !aggregatedScores) return [];
        const evals = activeItem.evaluations || [];
        return DIMENSIONS.map(dim => {
          const dataPoint = { subject: dim.shortLabel, fullMark: 5, average: aggregatedScores.averages[dim.key] || 0 };
          evals.forEach(e => { dataPoint[e.memberId] = (e.scores && e.scores[dim.key]) ? e.scores[dim.key] : 0; });
          return dataPoint;
        });
      }, [activeItem, aggregatedScores]);

      const alignmentData = useMemo(() => {
        if (!selectedProject) return [];
        return getProjectAlignmentData(selectedProject);
      }, [selectedProject]);

      const handleDraftScoreChange = (dimensionKey, newScore) => {
        setDraftScores(prev => ({ ...prev, [dimensionKey]: newScore }));
      };

      const submitScores = async () => {
        if (!isDraftComplete || !user || !selectedProject) return;
        const updateEvaluations = (evals) => {
          const currentEvals = evals || [];
          const hasEval = currentEvals.find(e => e.memberId === currentMemberId);
          if (hasEval) return currentEvals.map(e => e.memberId === currentMemberId ? { ...e, scores: { ...draftScores } } : e);
          else return [...currentEvals, { memberId: currentMemberId, scores: { ...draftScores } }];
        };
        let updatedData = {};
        if (activeItemId === 'main') {
          updatedData = { evaluations: updateEvaluations(selectedProject.evaluations) };
        } else {
          const subItems = selectedProject.subItems || [];
          updatedData = { subItems: subItems.map(sub => sub.id === activeItemId ? { ...sub, evaluations: updateEvaluations(sub.evaluations) } : sub) };
        }
        try {
          const projectsRef = getProjectsCollectionRef();
          await updateDoc(doc(projectsRef, selectedProject.id), updatedData);
        } catch (err) { console.error("Update failed:", err); }
      };

      const deleteScores = async () => {
        if (!user || !selectedProject) return;
        const removeEvaluation = (evals) => (evals || []).filter(e => e.memberId !== currentMemberId);
        let updatedData = {};
        if (activeItemId === 'main') {
          updatedData = { evaluations: removeEvaluation(selectedProject.evaluations) };
        } else {
          const subItems = selectedProject.subItems || [];
          updatedData = { subItems: subItems.map(sub => sub.id === activeItemId ? { ...sub, evaluations: removeEvaluation(sub.evaluations) } : sub) };
        }
        try {
          await updateDoc(doc(getProjectsCollectionRef(), selectedProject.id), updatedData);
          setDraftScores({});
        } catch (err) { console.error("Delete score failed:", err); }
      };

      const toggleRubric = (key) => setExpandedRubrics(prev => ({ ...prev, [key]: !prev[key] }));

      const handleAddProject = async (e) => {
        e.preventDefault();
        if (!newProject.name || !newProject.name.trim() || !user) return;
        const newId = 'p' + Date.now().toString();
        const maxOrder = projects.length > 0 ? Math.max(...projects.map(p => p.order || 0)) : 0;
        const createdProject = { id: newId, name: newProject.name.trim(), description: newProject.description || '', evaluations: [], subItems: [], order: maxOrder + 1 };
        setIsAddingProject(false);
        setNewProject({ name: '', description: '' });
        try { await setDoc(doc(getProjectsCollectionRef(), newId), createdProject); } catch (err) { console.error("setDoc failed:", err); }
      };

      const confirmEditProject = async (e) => {
        e.preventDefault();
        if (!editProjectData.name.trim() || !user || !selectedProject) return;
        try {
          await updateDoc(doc(getProjectsCollectionRef(), selectedProject.id), { name: editProjectData.name.trim(), description: editProjectData.description.trim() });
          setIsEditingProject(false);
        } catch (err) { console.error("updateDoc failed:", err); }
      };

      const confirmAddSubItem = async (e) => {
        e.preventDefault();
        if (newSubItemName && newSubItemName.trim() && user && selectedProject) {
          const newSubItem = { id: 's' + Date.now(), name: newSubItemName.trim(), evaluations: [] };
          const updatedSubItems = [...(selectedProject.subItems || []), newSubItem];
          setNewSubItemName('');
          setIsAddingSubItem(false);
          setActiveItemId(newSubItem.id);
          try { await updateDoc(doc(getProjectsCollectionRef(), selectedProject.id), { subItems: updatedSubItems }); } catch (err) { console.error("updateDoc failed:", err); }
        }
      };

      const deleteSubItem = async (subId) => {
        if (!user || !selectedProject) return;
        const updatedSubItems = (selectedProject.subItems || []).filter(sub => sub.id !== subId);
        try {
          await updateDoc(doc(getProjectsCollectionRef(), selectedProject.id), { subItems: updatedSubItems });
          if (activeItemId === subId) setActiveItemId('main');
          setDeletingSubItemId(null);
        } catch (err) { console.error("updateDoc failed:", err); }
      };

      const deleteProject = async (id) => {
        setDeletingId(null);
        setSelectedProjectId(null);
        if (!user) return;
        try { await deleteDoc(doc(getProjectsCollectionRef(), id)); } catch (err) { console.error("deleteDoc failed:", err); }
      };

      const getMemberTotal = (evals, memberId) => {
        const e = (evals || []).find(x => x.memberId === memberId);
        if (!e || !e.scores) return 0;
        return DIMENSIONS.reduce((sum, dim) => sum + (e.scores[dim.key] || 0), 0);
      };

      const exportToCSV = () => {
        if (!selectedProject) return;
        const subItems = selectedProject.subItems || [];
        let csvContent = `專案名稱,${selectedProject.name}\n專案描述,${selectedProject.description}\n\n`;
        csvContent += ['評分成員', '整體大專案 (滿分25)', ...subItems.map(s => `${s.name} (滿分25)`)].join(',') + '\n';
        MEMBERS.forEach(m => {
          const mainScore = getMemberTotal(selectedProject.evaluations, m.id);
          const subScores = subItems.map(sub => getMemberTotal(sub.evaluations, m.id));
          csvContent += [m.name, mainScore > 0 ? mainScore : '未評', ...subScores.map(s => s > 0 ? s : '未評')].join(',') + '\n';
        });
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${selectedProject.name}_評估報告.csv`;
        link.click();
      };

      const handleDragStart = (e, index) => {
        if (sortMethod !== 'manual' || !isAdmin) return;
        setDraggedIndex(index);
        setTimeout(() => { e.target.style.opacity = '0.5'; }, 0);
      };

      const handleDragEnter = (index) => {
        if (sortMethod !== 'manual' || !isAdmin || draggedIndex === null) return;

        if (sortMethod !== 'manual' || !isAdmin) return;
        e.target.style.opacity = '1';

        setDragOverIndex(null);

      const handleDrop = async (e, dropIndex) => {
        e.preventDefault();
        if (sortMethod !== 'manual' || !isAdmin || draggedIndex === null || draggedIndex === dropIndex) {
          handleDragEnd(e);
          return;
        }
        const newProjectsList = [...sortedProjects];
        const draggedItem = newProjectsList[draggedIndex];
        newProjectsList.splice(draggedIndex, 1);
        newProjectsList.splice(dropIndex, 0, draggedItem);
        const updatedProjects = newProjectsList.map((p, idx) => ({ ...p, order: idx }));
        handleDragEnd(e);
        try {
          const batch = writeBatch(db);
          const projectsRef = getProjectsCollectionRef();
          updatedProjects.forEach(p => batch.update(doc(projectsRef, p.id), { order: p.order }));
          await batch.commit();

                            {dim.label}
                          </h4>
                          <button onClick={() => toggleRubric(dim.key)} className="sm:hidden p-1.5 text-stone-400">
                            {isExpanded ? <ChevronUp className="w-4 h-4"/> : <ChevronDown className="w-4 h-4"/>}
                          </button>
                        </div>
                        <div className="flex items-center gap-4">
                          <div className="flex gap-1.5">
                            {[1, 2, 3, 4, 5].map(val => {
                              const isSelected = currentScore === val;
                              return (
                                <button key={val} onClick={() => handleDraftScoreChange(dim.key, val)}
                                  className={`w-9 h-9 flex items-center justify-center rounded-sm text-sm font-medium transition-all border ${isSelected ? `${themeClass.bgTheme} text-white border-transparent` : `bg-stone-50 text-stone-500 border-stone-200 hover:border-orange-300 hover:text-stone-700 hover:bg-white`}`}>
                                  {val}
                                </button>
                              );
                            })}
                          </div>
                          <button onClick={() => toggleRubric(dim.key)} className="hidden sm:flex text-stone-400 hover:text-orange-600 transition-colors p-1">
                            <Info className="w-4 h-4" />
                          </button>
                        </div>
                      </div>
                      <div className={`mt-4 text-sm font-medium py-2 px-3 inline-flex items-center gap-2 ${currentScore > 0 ? themeClass.textTheme : 'text-stone-400'}`}>
                        {currentScore > 0 && <span className="opacity-60 text-xs">Level {currentScore}.</span>}
                        {levelObj.title}
                      </div>
                      {isExpanded && (
                        <div className="mt-5 pt-5 border-t border-stone-100 text-sm animate-in fade-in slide-in-from-top-2">
                          <div className="p-4 bg-stone-50 border border-stone-100 rounded-sm mb-5 text-stone-600 leading-relaxed">
                            <strong className="text-stone-800 font-serif mr-1">Core Spirit.</strong> {dim.core}
                          </div>
                          <div className="space-y-1.5">
                            {[1, 2, 3, 4, 5].map((level) => {
                              const lvObj = dim.levels[level] || { title: '', desc: '' };
                              const isLvSelected = currentScore === level;
                              return (
                                <button key={level} onClick={() => handleDraftScoreChange(dim.key, level)}
                                  className={`w-full text-left p-3 rounded-sm flex gap-4 transition-colors border ${isLvSelected ? `${themeClass.bgLight} ${themeClass.borderLight}` : 'border-transparent hover:bg-stone-50'}`}>
                                  <span className={`font-serif shrink-0 mt-0.5 text-base ${isLvSelected ? themeClass.textTheme : 'text-stone-400'}`}>{level}</span>
                                  <div>
                                    <div className={`font-medium mb-1 tracking-wide ${isLvSelected ? themeClass.textDark : 'text-stone-700'}`}>{lvObj.title}</div>
                                    <div className={`text-xs leading-relaxed ${isLvSelected ? themeClass.textTheme : 'text-stone-500'}`}>{lvObj.desc}</div>
                                  </div>
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}

                <div className={`p-6 rounded-sm border flex flex-col sm:flex-row justify-between items-center gap-5 transition-all duration-300 ${isDraftComplete ? 'bg-white border-orange-200' : 'bg-stone-50 border-stone-200'}`}>
                  <div className="text-center sm:text-left">
                    <h4 className="font-serif text-stone-900 text-lg tracking-wide mb-1">Matrix Sync</h4>
                    <p className={`text-xs tracking-wide ${isDraftComplete ? 'text-stone-500' : 'text-red-700'}`}>
                      {isDraftComplete
                        ? hasUnsavedChanges ? '評量已完成，請確認並同步至雲端。' : '目前矩陣已同步至最新狀態。'
                        : `尚有 ${5 - DIMENSIONS.filter(d => draftScores[d.key] > 0).length} 項維度未完成評量`}
                    </p>
                  </div>
                  <div className="flex items-center gap-3">
                    {existingEval && (
                      <button onClick={deleteScores} className="px-5 py-2.5 rounded-sm text-sm font-medium tracking-widest transition-all whitespace-nowrap uppercase bg-white border border-red-200 text-red-500 hover:bg-red-50 hover:border-red-300">
                        Reset
                      </button>
                    )}
                    <button onClick={submitScores} disabled={!isDraftComplete || !hasUnsavedChanges}
                      className={`px-8 py-3 rounded-sm text-sm font-medium tracking-widest transition-all whitespace-nowrap uppercase ${isDraftComplete && hasUnsavedChanges ? `bg-orange-600 text-white hover:bg-orange-700 shadow-md shadow-orange-600/20` : 'bg-stone-200 text-stone-400 cursor-not-allowed'}`}>
                      {!hasUnsavedChanges && isDraftComplete ? 'Synchronized' : (existingEval ? 'Update' : 'Submit')}
                    </button>
                  </div>
                </div>
              </div>

              <div className="lg:col-span-5 lg:sticky lg:top-20 h-max space-y-6">
                <div className="bg-white p-6 rounded-sm border border-stone-200 shadow-sm">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="font-serif text-stone-900 text-lg tracking-wide">Capability Radar</h3>
                    <button onClick={() => setShowAllMembers(!showAllMembers)} className="text-xs text-stone-400 hover:text-orange-600 font-medium tracking-wide flex items-center gap-1.5 transition-colors uppercase">
                      {showAllMembers ? <EyeOff className="w-3.5 h-3.5"/> : <Eye className="w-3.5 h-3.5"/>}
                      {showAllMembers ? 'Hide All' : 'Show All'}
                    </button>
                  </div>
                  {(activeItem.evaluations || []).length === 0 ? (
                    <div className="w-full h-[320px] flex flex-col items-center justify-center bg-stone-50 border border-stone-200 rounded-sm">
                      <span className="text-stone-400 text-xs tracking-widest uppercase font-medium">No Data Available</span>
                    </div>
                  ) : (
                    <div style={{ width: '100%', height: '320px' }}>
                      <ResponsiveContainer width="100%" height="100%">
                        <RadarChart cx="50%" cy="50%" outerRadius="65%" data={radarData}>
                          <PolarGrid stroke="#e7e5e4" /> 
                          <PolarAngleAxis dataKey="subject" tick={{ fill: '#57534e', fontSize: 11, fontWeight: 500 }} />
                          <PolarRadiusAxis angle={30} domain={[0, 5]} tickCount={6} tick={{ fontSize: 9, fill: '#a8a29e' }} axisLine={false} />
                          {showAllMembers ? (
                            MEMBERS.map(m => {
                              const hasEval = (activeItem.evaluations || []).some(e => e.memberId === m.id);
                              if(!hasEval) return null;
                              return <Radar key={m.id} name={m.name} dataKey={m.id} stroke={m.color} fill="none" strokeWidth={1} strokeDasharray="3 3" />;
                            })
                          ) : (
                            <Radar name={currentMemberInfo.name} dataKey={currentMemberId} stroke={isMainActive ? '#ea580c' : '#57534e'} fill={isMainActive ? '#ea580c' : '#57534e'} fillOpacity={0.1} strokeWidth={2} />
                          )}
                          <Radar name="團隊均值" dataKey="average" stroke="#a8a29e" fill="#f5f5f4" fillOpacity={showAllMembers ? 0 : 0.6} strokeWidth={1} />
                          <Tooltip wrapperClassName="rounded-sm border border-stone-200 shadow-sm" contentStyle={{ backgroundColor: '#ffffff', borderRadius: '2px', border: 'none', color: '#1c1917', fontSize: '12px' }} itemStyle={{color: '#57534e'}} />
                          <Legend wrapperStyle={{ fontSize: '11px', paddingTop: '10px', color: '#57534e' }} />
                        </RadarChart>
                      </ResponsiveContainer>
                    </div>
                  )}
                </div>
                
                <div className="bg-white rounded-sm border border-stone-200 shadow-sm">
                  <div className="p-4 border-b border-stone-100 bg-stone-50/50">
                    <h4 className="font-serif text-stone-800 text-sm tracking-wide">Participants</h4>
                  </div>
                  <div className="p-2 space-y-0.5">
                    {MEMBERS.map(m => {
                      const ev = (activeItem.evaluations || []).find(e => e.memberId === m.id);
                      const isMe = m.id === currentMemberId;
                      if (!ev) {
                        return (
                          <div key={m.id} className="flex justify-between p-2 px-3 text-xs text-stone-400">
                            <span className="flex items-center gap-3"><span className="w-1.5 h-1.5 rounded-full bg-stone-200"></span>{m.name}</span>
                            <span className="tracking-widest uppercase">Pending</span>
                          </div>
                        );
                      }
                      const tot = DIMENSIONS.reduce((s, dim) => s + (ev.scores[dim.key] || 0), 0);
                      return (
                        <div key={m.id} className={`flex justify-between p-2 px-3 text-sm font-medium rounded-sm ${isMe ? `bg-orange-50 text-stone-900` : 'text-stone-600 hover:bg-stone-50'}`}>
                          <span className="flex items-center gap-3">
                            <span className="w-1.5 h-1.5 rounded-full" style={{backgroundColor: m.color}}></span>
                            {m.name} {isMe && <span className="text-[9px] text-orange-600 ml-1 italic font-serif">You</span>}
                          </span>
                          <span className={`font-mono text-sm ${themeClass.textTheme}`}>{tot}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>

            {subItemsList.length > 0 && (
              <div className="mt-16 pt-12 border-t border-stone-200">
                <div className="mb-8">
                  <h3 className="text-2xl font-serif text-stone-900 flex items-center tracking-wide mb-3">
                    <GitMerge className="w-6 h-6 mr-3 text-orange-600" />
                    架構一致性比對
                    <span className="ml-4 px-2 py-0.5 bg-stone-100 text-stone-500 text-[10px] uppercase tracking-widest font-sans rounded-sm">Alignment Analysis</span>
                  </h3>
                  <p className="text-stone-500 text-sm max-w-3xl leading-relaxed">
                    比對「大專案」與「各子項目」的團隊均值分佈。若大專案均值遠高於子項目，可能意味著整體概念未能有效落實於局部實踐中；反之，則可能有隱藏的局部價值尚未被提昇至專案層次。
                  </p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div className="bg-white p-6 rounded-sm border border-stone-200 shadow-sm">
                    <h4 className="font-serif text-stone-800 text-base mb-6 tracking-wide text-center">Macro vs Micro Radar</h4>
                    <div style={{ width: '100%', height: '350px' }}>
                      <ResponsiveContainer width="100%" height="100%">
                        <RadarChart cx="50%" cy="50%" outerRadius="70%" data={alignmentData}>
                          <PolarGrid stroke="#e7e5e4" />
                          <PolarAngleAxis dataKey="subject" tick={{ fill: '#57534e', fontSize: 12, fontWeight: 500 }} />
                          <PolarRadiusAxis angle={30} domain={[0, 5]} tickCount={6} tick={{ fontSize: 9, fill: '#a8a29e' }} axisLine={false} />
                          <Radar name="大專案 (團隊均值)" dataKey="mainProject" stroke="#ea580c" fill="#ea580c" fillOpacity={0.15} strokeWidth={2} />
                          <Radar name="子項目 (總體均值)" dataKey="subItemsAverage" stroke="#57534e" fill="none" strokeWidth={2} strokeDasharray="5 5" />
                          <Tooltip wrapperClassName="rounded-sm border border-stone-200 shadow-sm" contentStyle={{ backgroundColor: '#ffffff', borderRadius: '2px', border: 'none', color: '#1c1917', fontSize: '12px' }} />
                          <Legend wrapperStyle={{ fontSize: '12px', paddingTop: '15px', color: '#57534e' }} />
                        </RadarChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                  <div className="bg-white rounded-sm border border-stone-200 shadow-sm overflow-hidden flex flex-col">
                    <div className="p-4 border-b border-stone-100 bg-stone-50/50">
                      <h4 className="font-serif text-stone-800 text-base tracking-wide">Dimension Variance</h4>
                    </div>
                    <div className="flex-1 overflow-x-auto p-4">
                      <table className="w-full text-sm text-left border-collapse">
                        <thead className="text-stone-400 text-[10px] tracking-[0.1em] uppercase border-b border-stone-200">
                          <tr>
                            <th className="pb-3 font-medium">Dimension</th>
                            <th className="pb-3 font-medium text-right text-orange-600">Main Avg</th>
                            <th className="pb-3 font-medium text-right text-stone-600">Sub Avg</th>
                            <th className="pb-3 font-medium text-right">Gap</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-stone-100">
                          {alignmentData.map((data, i) => {
                            const gap = (data.mainProject - data.subItemsAverage).toFixed(1);
                            const isSignificant = Math.abs(gap) >= 1.0;
                            return (
                              <tr key={i} className="hover:bg-stone-50/50 transition-colors">
                                <td className="py-4 font-medium text-stone-700">{data.subject}</td>
                                <td className="py-4 font-mono text-right text-stone-800">{data.mainProject > 0 ? data.mainProject : '-'}</td>
                                <td className="py-4 font-mono text-right text-stone-600">{data.subItemsAverage > 0 ? data.subItemsAverage : '-'}</td>
                                <td className={`py-4 font-mono text-right font-medium ${isSignificant ? 'text-orange-600' : 'text-stone-400'}`}>
                                  {gap > 0 ? `+${gap}` : gap}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    <div className="p-4 bg-stone-50 text-xs text-stone-500 border-t border-stone-100">
                      * Gap = Main Avg - Sub Avg. 差距超過 1.0 標示為橘色，建議團隊進行探討。
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div className="bg-white rounded-sm border border-stone-200 shadow-sm overflow-hidden mt-12">
              <div className="p-5 border-b border-stone-200 flex justify-between items-center gap-4 bg-stone-50/50">
                <h3 className="text-lg md:text-xl font-serif text-stone-900 tracking-wide flex items-center">
                  層級分數總表
                  <span className="hidden sm:inline-block ml-4 px-2 py-0.5 bg-white border border-stone-200 text-stone-500 text-[10px] uppercase tracking-widest font-sans rounded-sm">Data Report</span>
                </h3>
                <button onClick={exportToCSV} className="flex items-center gap-1.5 text-stone-400 hover:text-orange-600 transition-colors text-[11px] uppercase tracking-widest font-medium ml-auto sm:ml-0">
                  <Download className="w-3.5 h-3.5" /> <span className="hidden sm:inline">Export</span>
                </button>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left border-collapse">
                  <thead className="bg-white text-stone-400 text-[10px] tracking-[0.15em] uppercase border-b border-stone-200">
                    <tr>
                      <th className="p-4 font-medium whitespace-nowrap">Member</th>
                      <th className="p-4 font-medium whitespace-nowrap border-l border-stone-100 text-orange-600">Main Project (25)</th>
                      {subItemsList.map(sub => <th key={sub.id} className="p-4 font-medium whitespace-nowrap border-l border-stone-100">{sub.name} (25)</th>)}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-stone-100 text-sm">
                    {MEMBERS.map(m => {
                      const mainScore = getMemberTotal(selectedProject.evaluations, m.id);
                      const subScores = subItemsList.map(sub => getMemberTotal(sub.evaluations, m.id));
                      const isCurrent = m.id === currentMemberId;
                      return (
                        <tr key={m.id} className={`transition-colors ${isCurrent ? 'bg-orange-50/30' : 'hover:bg-stone-50/50'}`}>
                          <td className="p-4 font-medium flex items-center gap-3 whitespace-nowrap text-stone-700">
                            <span className="w-2 h-2 rounded-full" style={{backgroundColor: m.color}}></span>
                            {m.name} {isCurrent && <span className="font-serif italic text-[10px] text-orange-500 ml-1">You</span>}
                          </td>
                          <td className={`p-4 font-mono text-base border-l border-stone-100 ${mainScore > 0 ? 'text-stone-800' : 'text-stone-300'}`}>{mainScore > 0 ? mainScore : '-'}</td>
                          {subScores.map((score, i) => (
                            <td key={i} className={`p-4 font-mono text-base border-l border-stone-100 ${score > 0 ? 'text-stone-600' : 'text-stone-300'}`}>{score > 0 ? score : '-'}</td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          {isAdmin && isAddingSubItem && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-sm p-8 max-w-md w-full shadow-xl border border-stone-200 animate-in zoom-in-95 duration-200">
                <h3 className="text-xl font-serif text-stone-900 mb-2 tracking-wide">新增子項目</h3>
                <p className="text-stone-500 text-sm mb-6">請為此專案輸入需要獨立評估的子項目名稱（如：主視覺、網站設計）。</p>
                <form onSubmit={confirmAddSubItem}>
                  <input autoFocus type="text" className="w-full p-3 rounded-sm bg-stone-50 border border-stone-200 focus:outline-none focus:bg-white focus:border-orange-500 transition-colors mb-6 text-stone-800 placeholder-stone-400" placeholder="輸入名稱..." value={newSubItemName} onChange={(e) => setNewSubItemName(e.target.value)} />
                  <div className="flex justify-end gap-3">
                    <button type="button" onClick={() => {setIsAddingSubItem(false); setNewSubItemName('');}} className="px-5 py-2.5 text-sm font-medium tracking-wide text-stone-500 hover:text-stone-800 transition-colors">取消</button>
                    <button type="submit" disabled={!newSubItemName.trim()} className="px-6 py-2.5 rounded-sm text-sm font-medium tracking-wide bg-orange-600 text-white hover:bg-orange-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm shadow-orange-600/20">確認新增</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {isAdmin && isEditingProject && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-sm p-8 max-w-md w-full shadow-xl border border-stone-200 animate-in zoom-in-95 duration-200">
                <h3 className="text-xl font-serif text-stone-900 mb-2 tracking-wide">編輯專案</h3>
                <p className="text-stone-500 text-sm mb-6">修改大專案的名稱與簡述。</p>
                <form onSubmit={confirmEditProject}>
                  <input autoFocus type="text" className="w-full p-3 rounded-sm bg-stone-50 border border-stone-200 focus:outline-none focus:bg-white focus:border-orange-500 transition-colors mb-4 text-stone-800 placeholder-stone-400" placeholder="專案名稱" value={editProjectData.name} onChange={(e) => setEditProjectData({ ...editProjectData, name: e.target.value })} />
                  <textarea className="w-full p-3 rounded-sm bg-stone-50 border border-stone-200 focus:outline-none focus:bg-white focus:border-orange-500 transition-colors mb-6 text-stone-800 placeholder-stone-400 resize-none" placeholder="專案簡述..." rows="3" value={editProjectData.description} onChange={(e) => setEditProjectData({ ...editProjectData, description: e.target.value })} />
                  <div className="flex justify-end gap-3">
                    <button type="button" onClick={() => setIsEditingProject(false)} className="px-5 py-2.5 text-sm font-medium tracking-wide text-stone-500 hover:text-stone-800 transition-colors">取消</button>
                    <button type="submit" disabled={!editProjectData.name.trim()} className="px-6 py-2.5 rounded-sm text-sm font-medium tracking-wide bg-orange-600 text-white hover:bg-orange-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm shadow-orange-600/20">儲存變更</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
