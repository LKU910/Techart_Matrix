    const getProjectMainRadarData = (project) => {
      const evals = project.evaluations || [];
      const dimAverages = {};
      DIMENSIONS.forEach(dim => {
        const sum = evals.reduce((acc, curr) => acc + (curr.scores && curr.scores[dim.key] ? curr.scores[dim.key] : 0), 0);
        dimAverages[dim.key] = evals.length > 0 ? Number((sum / evals.length).toFixed(1)) : 0;
      });
      return DIMENSIONS.map(dim => ({
        subject: dim.shortLabel,
        fullMark: 5,
        average: dimAverages[dim.key]
      }));
    };

    const getProjectAlignmentData = (project) => {
      return DIMENSIONS.map(dim => {
        const mainEvals = project.evaluations || [];
        const mainSum = mainEvals.reduce((acc, curr) => acc + (curr.scores?.[dim.key] || 0), 0);
        const mainAvg = mainEvals.length > 0 ? (mainSum / mainEvals.length) : 0;
        const subItems = project.subItems || [];
        let subSum = 0;
        let subEvalCount = 0;
        subItems.forEach(sub => {
          const sEvals = sub.evaluations || [];
          sEvals.forEach(e => {
            if (e.scores && e.scores[dim.key]) {
              subSum += e.scores[dim.key];
              subEvalCount++;
            }
          });
        });
        const subAvg = subEvalCount > 0 ? (subSum / subEvalCount) : 0;
        return {
          subject: dim.shortLabel,
          mainProject: Number(mainAvg.toFixed(1)),
          subItemsAverage: Number(subAvg.toFixed(1)),
          fullMark: 5
        };
      });
    };

            fetchedProjects.forEach(async (p) => {
              const patched = ensureDefaultSubItems(p.subItems);
              if (patched.length !== (p.subItems || []).length) {
                try {
                  await updateDoc(doc(projectsRef, p.id), { subItems: patched });
                } catch (e) { console.error("Migration patch failed:", e); }
              }
            });
            setProjects(fetchedProjects);
            setLoadingDb(false);
          }
        }, (error) => {
          console.error("Firestore error:", error);
          setLoadingDb(false);
        });
        return () => unsubscribe();
      }, [user]);

      const isAdmin = currentMemberId === 'm2' || currentMemberId === 'm3';

      const sortedProjects = useMemo(() => {
        let list = [...projects];
        if (sortMethod === 'date') list.sort((a, b) => b.id.localeCompare(a.id));
        else if (sortMethod === 'name') list.sort((a, b) => a.name.localeCompare(b.name));
        else if (sortMethod === 'manual') {
          list.sort((a, b) => {
            const orderA = a.order !== undefined ? a.order : Number.MAX_SAFE_INTEGER;
            const orderB = b.order !== undefined ? b.order : Number.MAX_SAFE_INTEGER;
            return orderA - orderB;
          });
        }
        return list;
      }, [projects, sortMethod]);

      const currentMemberInfo = useMemo(() => MEMBERS.find(m => m.id === currentMemberId) || MEMBERS[0], [currentMemberId]);
      const selectedProject = useMemo(() => projects.find(p => p.id === selectedProjectId) || null, [projects, selectedProjectId]);

      const activeItem = useMemo(() => {
        if (!selectedProject) return null;
        if (activeItemId === 'main') return selectedProject;
        const subItems = selectedProject.subItems || [];
        const foundSub = subItems.find(sub => sub.id === activeItemId);
        return foundSub ? foundSub : selectedProject;
      }, [selectedProject, activeItemId]);

      useEffect(() => {
        if (activeItem && currentMemberId) {
          const existingEval = (activeItem.evaluations || []).find(e => e.memberId === currentMemberId);
          if (existingEval && existingEval.scores) setDraftScores({ ...existingEval.scores });
          else setDraftScores({});
        }
      }, [activeItem, currentMemberId]);

      // 根據當前子項目類型動態取得對應的評分描述
      const activeDimensions = useMemo(() => {
        if (!activeItem || activeItemId === 'main') return DIMENSIONS;
        const subType = activeItem.type;
        if (subType && SUB_ITEM_DIMENSIONS[subType]) return SUB_ITEM_DIMENSIONS[subType];
        return DIMENSIONS;
      }, [activeItem, activeItemId]);

      const isDraftComplete = useMemo(() => activeDimensions.every(dim => (draftScores[dim.key] || 0) > 0), [draftScores, activeDimensions]);

      const hasUnsavedChanges = useMemo(() => {
        const existingEval = (activeItem?.evaluations || []).find(e => e.memberId === currentMemberId);
        const existingScores = existingEval ? existingEval.scores : {};
        return activeDimensions.some(dim => (existingScores[dim.key] || 0) !== (draftScores[dim.key] || 0));
      }, [activeItem, currentMemberId, draftScores, activeDimensions]);

      const aggregatedScores = useMemo(() => {
        if (!activeItem) return null;
        const dimAverages = {};
        let totalAverageScore = 0;
        const evals = activeItem.evaluations || [];
        DIMENSIONS.forEach(dim => {
          const sum = evals.reduce((acc, curr) => acc + ((curr.scores && curr.scores[dim.key]) ? curr.scores[dim.key] : 0), 0);
          const avg = evals.length > 0 ? (sum / evals.length) : 0;
          dimAverages[dim.key] = Number(avg.toFixed(1));
          totalAverageScore += avg;
        });
        return { averages: dimAverages, total: Number(totalAverageScore.toFixed(1)) };
      }, [activeItem]);

      const radarData = useMemo(() => {
        if (!activeItem || !aggregatedScores) return [];
        const evals = activeItem.evaluations || [];
        return DIMENSIONS.map(dim => {
          const dataPoint = { subject: dim.shortLabel, fullMark: 5, average: aggregatedScores.averages[dim.key] || 0 };
          evals.forEach(e => { dataPoint[e.memberId] = (e.scores && e.scores[dim.key]) ? e.scores[dim.key] : 0; });
          return dataPoint;
        });
      }, [activeItem, aggregatedScores]);

      const alignmentData = useMemo(() => {
        if (!selectedProject) return [];
        return getProjectAlignmentData(selectedProject);
      }, [selectedProject]);

      const handleDraftScoreChange = (dimensionKey, newScore) => {
        setDraftScores(prev => ({ ...prev, [dimensionKey]: newScore }));
      };

      const submitScores = async () => {
        if (!isDraftComplete || !user || !selectedProject) return;
        const updateEvaluations = (evals) => {
          const currentEvals = evals || [];
          const hasEval = currentEvals.find(e => e.memberId === currentMemberId);
          if (hasEval) return currentEvals.map(e => e.memberId === currentMemberId ? { ...e, scores: { ...draftScores } } : e);
          else return [...currentEvals, { memberId: currentMemberId, scores: { ...draftScores } }];
        };
        let updatedData = {};
        if (activeItemId === 'main') {
          updatedData = { evaluations: updateEvaluations(selectedProject.evaluations) };
        } else {
          const subItems = selectedProject.subItems || [];
          updatedData = { subItems: subItems.map(sub => sub.id === activeItemId ? { ...sub, evaluations: updateEvaluations(sub.evaluations) } : sub) };
        }
        try {
          const projectsRef = getProjectsCollectionRef();
          await updateDoc(doc(projectsRef, selectedProject.id), updatedData);
        } catch (err) { console.error("Update failed:", err); }
      };

      const deleteScores = async () => {
        if (!user || !selectedProject) return;
        const removeEvaluation = (evals) => (evals || []).filter(e => e.memberId !== currentMemberId);
        let updatedData = {};
        if (activeItemId === 'main') {
          updatedData = { evaluations: removeEvaluation(selectedProject.evaluations) };
        } else {
          const subItems = selectedProject.subItems || [];
          updatedData = { subItems: subItems.map(sub => sub.id === activeItemId ? { ...sub, evaluations: removeEvaluation(sub.evaluations) } : sub) };
        }
        try {
          await updateDoc(doc(getProjectsCollectionRef(), selectedProject.id), updatedData);
          setDraftScores({});
        } catch (err) { console.error("Delete score failed:", err); }
      };

      const toggleRubric = (key) => setExpandedRubrics(prev => ({ ...prev, [key]: !prev[key] }));

      const handleAddProject = async (e) => {
        e.preventDefault();
        if (!newProject.name || !newProject.name.trim() || !user) return;
        const newId = 'p' + Date.now().toString();
        const maxOrder = projects.length > 0 ? Math.max(...projects.map(p => p.order || 0)) : 0;
        const createdProject = { id: newId, name: newProject.name.trim(), description: newProject.description || '', evaluations: [], subItems: createDefaultSubItems(), order: maxOrder + 1 };
        setIsAddingProject(false);
        setNewProject({ name: '', description: '' });
        try { await setDoc(doc(getProjectsCollectionRef(), newId), createdProject); } catch (err) { console.error("setDoc failed:", err); }
      };

      const confirmEditProject = async (e) => {
        e.preventDefault();
        if (!editProjectData.name.trim() || !user || !selectedProject) return;
        try {
          await updateDoc(doc(getProjectsCollectionRef(), selectedProject.id), { name: editProjectData.name.trim(), description: editProjectData.description.trim() });
          setIsEditingProject(false);
        } catch (err) { console.error("updateDoc failed:", err); }
      };

      const confirmAddSubItem = async (e) => {
        e.preventDefault();
        if (newSubItemName && newSubItemName.trim() && user && selectedProject) {
          const trimmedName = newSubItemName.trim();
          const newSubItem = { id: 's' + Date.now(), name: trimmedName, type: SUB_ITEM_TYPES.includes(trimmedName) ? trimmedName : null, evaluations: [] };
          const updatedSubItems = [...(selectedProject.subItems || []), newSubItem];
          setNewSubItemName('');
          setIsAddingSubItem(false);
          setActiveItemId(newSubItem.id);
          try { await updateDoc(doc(getProjectsCollectionRef(), selectedProject.id), { subItems: updatedSubItems }); } catch (err) { console.error("updateDoc failed:", err); }
        }
      };

      const deleteSubItem = async (subId) => {
        if (!user || !selectedProject) return;
        const updatedSubItems = (selectedProject.subItems || []).filter(sub => sub.id !== subId);
        try {
          await updateDoc(doc(getProjectsCollectionRef(), selectedProject.id), { subItems: updatedSubItems });
          if (activeItemId === subId) setActiveItemId('main');
          setDeletingSubItemId(null);
        } catch (err) { console.error("updateDoc failed:", err); }
      };

      const deleteProject = async (id) => {
        setDeletingId(null);
        setSelectedProjectId(null);
        if (!user) return;
        try { await deleteDoc(doc(getProjectsCollectionRef(), id)); } catch (err) { console.error("deleteDoc failed:", err); }
      };

      const getMemberTotal = (evals, memberId) => {
        const e = (evals || []).find(x => x.memberId === memberId);
        if (!e || !e.scores) return 0;
        return DIMENSIONS.reduce((sum, dim) => sum + (e.scores[dim.key] || 0), 0);
      };

      const exportToCSV = () => {
        if (!selectedProject) return;
        const subItems = selectedProject.subItems || [];
        let csvContent = `專案名稱,${selectedProject.name}\n專案描述,${selectedProject.description}\n\n`;
        csvContent += ['評分成員', '整體大專案 (滿分25)', ...subItems.map(s => `${s.name} (滿分25)`)].join(',') + '\n';
        MEMBERS.forEach(m => {
          const mainScore = getMemberTotal(selectedProject.evaluations, m.id);
          const subScores = subItems.map(sub => getMemberTotal(sub.evaluations, m.id));
          csvContent += [m.name, mainScore > 0 ? mainScore : '未評', ...subScores.map(s => s > 0 ? s : '未評')].join(',') + '\n';
        });
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${selectedProject.name}_評估報告.csv`;
        link.click();
      };

      const handleDragStart = (e, index) => {
        if (sortMethod !== 'manual' || !isAdmin) return;
        setDraggedIndex(index);
        setTimeout(() => { e.target.style.opacity = '0.5'; }, 0);
      };

      const handleDragEnter = (index) => {
        if (sortMethod !== 'manual' || !isAdmin || draggedIndex === null) return;
        setDragOverIndex(index);
      };

      const handleDragEnd = (e) => {
        if (sortMethod !== 'manual' || !isAdmin) return;
        e.target.style.opacity = '1';
        setDraggedIndex(null);
        setDragOverIndex(null);
      };

      const handleDrop = async (e, dropIndex) => {
        e.preventDefault();
        if (sortMethod !== 'manual' || !isAdmin || draggedIndex === null || draggedIndex === dropIndex) {
          handleDragEnd(e);
          return;
        }
        const newProjectsList = [...sortedProjects];
        const draggedItem = newProjectsList[draggedIndex];
        newProjectsList.splice(draggedIndex, 1);
        newProjectsList.splice(dropIndex, 0, draggedItem);
        const updatedProjects = newProjectsList.map((p, idx) => ({ ...p, order: idx }));
        handleDragEnd(e);
        try {
          const batch = writeBatch(db);
          const projectsRef = getProjectsCollectionRef();
          updatedProjects.forEach(p => batch.update(doc(projectsRef, p.id), { order: p.order }));
          await batch.commit();
        } catch (err) { console.error("Batch update failed:", err); }
      };

      const TechartLogo = ({ large = false }) => (
        <div className="flex flex-col items-center justify-center cursor-default text-center">
          <img 
            src="./LOGO.png" 
            alt="TECHART 天工開物" 
            className={`${large ? 'h-10 md:h-12' : 'h-5 md:h-6'} object-contain mb-3`}
          />
        </div>
      );

      if (loadingDb) {
        return (
          <div className="min-h-screen bg-stone-50 flex flex-col items-center justify-center font-sans">
            <Loader2 className="w-8 h-8 animate-spin text-orange-600 mb-4" />
            <div className="text-sm font-serif tracking-widest text-stone-500">we do computer human romance.</div>
          </div>
        );
      }

      // ==========================================
      // 視圖：矩陣總覽模式
      // ==========================================
      if (isOverviewMode) {
        return (
          <div className="min-h-screen bg-[#fdfbf9] font-sans text-stone-800 pb-24 selection:bg-orange-100">
            <div className="sticky top-0 z-30 bg-[#fdfbf9]/90 backdrop-blur-md border-b border-stone-200 shadow-sm">
              <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <button onClick={() => setIsOverviewMode(false)} className="flex items-center text-stone-500 font-medium text-sm hover:text-orange-600 transition-colors tracking-wide">
                  <ChevronLeft className="w-4 h-4 mr-1" /> 返回登入頁
                </button>
                <TechartLogo />
              </div>
            </div>

            <main className="max-w-7xl mx-auto p-4 sm:p-8 space-y-12 animate-in fade-in duration-500 mt-4">
              <div className="text-center mb-12">
                <h2 className="text-3xl md:text-4xl font-serif text-stone-900 tracking-wide mb-4">專案矩陣總覽</h2>
                <p className="text-stone-500 max-w-2xl mx-auto leading-relaxed">綜觀所有專案的整體表現與落差分析，以量化數據輔助設計決策。</p>
              </div>

              {sortedProjects.length === 0 ? (
                <div className="text-center text-stone-400 py-20 bg-white border border-stone-200 rounded-sm">目前尚無任何專案資料。</div>
              ) : (
                sortedProjects.map(project => {
                  const mainRadar = getProjectMainRadarData(project);
                  const alignRadar = getProjectAlignmentData(project);
                  return (
                    <div key={project.id} className="bg-white rounded-sm border border-stone-200 shadow-sm overflow-hidden">
                      <div className="p-6 md:p-8 border-b border-stone-100 bg-stone-50/50">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                          <div>
                            <div className="text-[10px] uppercase tracking-widest text-orange-600 mb-2 font-medium">Project Review</div>
                            <h3 className="text-2xl font-serif text-stone-900">{project.name}</h3>
                          </div>
                          <div className="text-xs text-stone-400 font-medium flex gap-4">
                            <span><FileText className="w-3.5 h-3.5 inline mr-1" />{project.subItems?.length || 0} 子項目</span>
                            <span><Users className="w-3.5 h-3.5 inline mr-1" />{project.evaluations?.length || 0} 評量數</span>
                          </div>
                        </div>
                      </div>
                      <div className="p-6 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div className="flex flex-col">
                          <h4 className="font-serif text-stone-800 text-base mb-6 tracking-wide text-center flex items-center justify-center gap-2">
                            <BarChart2 className="w-4 h-4 text-stone-400" /> 大專案團隊均值
                          </h4>
                          <div style={{ width: '100%', height: '320px' }}>
                            <ResponsiveContainer width="100%" height="100%">
                              <RadarChart cx="50%" cy="50%" outerRadius="70%" data={mainRadar}>
                                <PolarGrid stroke="#e7e5e4" /> 
                                <PolarAngleAxis dataKey="subject" tick={{ fill: '#57534e', fontSize: 11, fontWeight: 500 }} />
                                <PolarRadiusAxis angle={30} domain={[0, 5]} tickCount={6} tick={{ fontSize: 9, fill: '#a8a29e' }} axisLine={false} />
                                <Radar name="團隊均值" dataKey="average" stroke="#57534e" fill="#57534e" fillOpacity={0.2} strokeWidth={2} />
                                <Tooltip wrapperClassName="rounded-sm border border-stone-200 shadow-sm" contentStyle={{ backgroundColor: '#ffffff', borderRadius: '2px', border: 'none', color: '#1c1917', fontSize: '12px' }} itemStyle={{color: '#57534e'}} />
                              </RadarChart>
                            </ResponsiveContainer>
                          </div>
                        </div>
                        <div className="flex flex-col">
                          <h4 className="font-serif text-stone-800 text-base mb-6 tracking-wide text-center flex items-center justify-center gap-2">
                            <GitMerge className="w-4 h-4 text-orange-600" /> 架構一致性比對 (總體 vs 子項目)
                          </h4>
                          <div style={{ width: '100%', height: '320px' }}>
                            <ResponsiveContainer width="100%" height="100%">
                              <RadarChart cx="50%" cy="50%" outerRadius="70%" data={alignRadar}>
                                <PolarGrid stroke="#e7e5e4" />
                                <PolarAngleAxis dataKey="subject" tick={{ fill: '#57534e', fontSize: 11, fontWeight: 500 }} />
                                <PolarRadiusAxis angle={30} domain={[0, 5]} tickCount={6} tick={{ fontSize: 9, fill: '#a8a29e' }} axisLine={false} />
                                <Radar name="大專案 (團隊均值)" dataKey="mainProject" stroke="#ea580c" fill="#ea580c" fillOpacity={0.15} strokeWidth={2} />
                                <Radar name="子項目 (總體均值)" dataKey="subItemsAverage" stroke="#57534e" fill="none" strokeWidth={2} strokeDasharray="5 5" />
                                <Tooltip wrapperClassName="rounded-sm border border-stone-200 shadow-sm" contentStyle={{ backgroundColor: '#ffffff', borderRadius: '2px', border: 'none', color: '#1c1917', fontSize: '12px' }} />
                                <Legend wrapperStyle={{ fontSize: '12px', paddingTop: '15px', color: '#57534e' }} />
                              </RadarChart>
                            </ResponsiveContainer>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })
              )}
            </main>
          </div>
        );
      }

      // ==========================================
      // 視圖一：身分選擇頁
      // ==========================================
      if (!currentMemberId) {
        return (
          <div className="min-h-screen bg-[#fdfbf9] flex flex-col items-center justify-center p-4 font-sans text-stone-800 selection:bg-orange-100">
            <div className="bg-white p-10 md:p-14 rounded-sm shadow-sm border border-stone-200 max-w-2xl w-full text-center relative mb-8">
              <div className="absolute top-0 left-0 w-full h-1 bg-orange-600"></div>
              <div className="flex justify-center mb-10 mt-2">
                <TechartLogo large={true} />
              </div>
              <h1 className="text-2xl md:text-3xl font-serif text-stone-900 tracking-wide mb-12">設計品質評量矩陣</h1>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                {MEMBERS.map(m => (
                  <button 
                    key={m.id} 
                    onClick={() => setCurrentMemberId(m.id)}
                    className="group flex items-center justify-center gap-3 p-4 rounded-sm bg-white border border-stone-200 hover:border-orange-600 hover:bg-orange-50 transition-colors text-stone-700"
                  >
                    <span className="w-2 h-2 rounded-full opacity-70 group-hover:opacity-100 transition-opacity" style={{backgroundColor: m.color}}></span>
                    <span className="font-medium tracking-wide group-hover:text-orange-800">{m.name}</span>
                  </button>
                ))}
              </div>
            </div>
            <button 
              onClick={() => setIsOverviewMode(true)}
              className="flex items-center justify-center gap-2 px-8 py-3 bg-stone-800 text-white rounded-sm text-sm tracking-widest uppercase hover:bg-stone-700 transition-all shadow-md shadow-stone-800/10"
            >
              <Sparkles className="w-4 h-4 text-orange-400" /> 進入矩陣總覽
            </button>
          </div>
        );
      }

      // ==========================================
      // 視圖二：大專案列表頁
      // ==========================================
      if (!selectedProject) {
        return (
          <div className="min-h-screen bg-[#fdfbf9] p-4 md:p-8 font-sans selection:bg-orange-100">
            <div className="max-w-5xl mx-auto space-y-8">
              <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 border-b border-stone-200 pb-6">
                <div className="flex items-center gap-5">
                  <button onClick={() => setCurrentMemberId(null)} className="p-2 -ml-2 text-stone-400 hover:text-orange-600 transition-colors">
                    <ChevronLeft className="w-5 h-5" />
                  </button>
                  <TechartLogo />
                </div>
                <div className="w-full sm:w-auto flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 sm:gap-6">
                  <div className="flex items-center gap-1 bg-stone-100 p-1 rounded-sm border border-stone-200 text-xs text-stone-500 font-medium">
                    <button onClick={() => setSortMethod('date')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-sm transition-all ${sortMethod === 'date' ? 'bg-white text-stone-900 shadow-sm' : 'hover:text-stone-700'}`}>
                      <Clock className="w-3.5 h-3.5" /> 最新
                    </button>
                    <button onClick={() => setSortMethod('name')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-sm transition-all ${sortMethod === 'name' ? 'bg-white text-stone-900 shadow-sm' : 'hover:text-stone-700'}`}>
                      <ArrowDownAZ className="w-3.5 h-3.5" /> 名稱
                    </button>
                    <button onClick={() => setSortMethod('manual')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-sm transition-all ${sortMethod === 'manual' ? 'bg-white text-orange-700 shadow-sm' : 'hover:text-stone-700'}`}>
                      <Settings2 className="w-3.5 h-3.5" /> 自訂
                    </button>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="text-sm font-medium text-stone-500 bg-stone-50 px-3 py-1.5 rounded-lg border border-stone-100 hidden sm:block">
                      User: <span style={{color: currentMemberInfo.color}} className="font-bold ml-1">{currentMemberInfo.name}</span>
                    </div>
                    {isAdmin && (
                      <button onClick={() => setIsAddingProject(!isAddingProject)} className="flex items-center justify-center gap-2 px-5 py-2.5 bg-orange-600 text-white rounded-sm text-sm tracking-wide hover:bg-orange-700 transition-colors shadow-sm shadow-orange-600/20">
                        {isAddingProject ? <X className="w-4 h-4" /> : <Plus className="w-4 h-4" />}
                        {isAddingProject ? '取消建立' : '建立大專案'}
                      </button>
                    )}
                  </div>
                </div>
              </header>

              {isAdmin && isAddingProject && (
                <form onSubmit={handleAddProject} className="bg-white p-8 rounded-sm border-t-2 border-t-orange-600 border border-stone-200 shadow-sm animate-in fade-in slide-in-from-top-2">
                  <h3 className="font-serif text-lg text-stone-800 mb-4 tracking-wide">建立新專案</h3>
                  <input type="text" placeholder="專案名稱" required className="w-full mb-4 p-4 rounded-sm bg-stone-50 border border-stone-200 text-stone-900 placeholder-stone-400 focus:outline-none focus:bg-white focus:border-orange-500 transition-all font-medium" value={newProject.name} onChange={(e) => setNewProject({ ...newProject, name: e.target.value })} />
                  <textarea placeholder="專案簡述..." className="w-full mb-6 p-4 rounded-sm bg-stone-50 border border-stone-200 text-stone-900 placeholder-stone-400 resize-none focus:outline-none focus:bg-white focus:border-orange-500 transition-all" rows="2" value={newProject.description} onChange={(e) => setNewProject({ ...newProject, description: e.target.value })} />
                  <div className="flex justify-end">
                    <button type="submit" className="px-6 py-2.5 bg-orange-600 text-white rounded-sm tracking-wide hover:bg-orange-700 transition-colors shadow-sm">確認建立</button>
                  </div>
                </form>
              )}

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {sortedProjects.map((project, index) => {
                  const subItems = project.subItems || [];
                  const evals = project.evaluations || [];
                  const isManualMode = sortMethod === 'manual';
                  const isDragOver = dragOverIndex === index;
                  return (
                    <div 
                      key={project.id} 
                      className={`relative group ${isDragOver ? 'drag-over' : ''} ${isManualMode && isAdmin ? 'cursor-grab active:cursor-grabbing' : ''}`}
                      draggable={isManualMode && isAdmin}
                      onDragStart={(e) => handleDragStart(e, index)}
                      onDragEnter={() => handleDragEnter(index)}
                      onDragOver={(e) => e.preventDefault()}
                      onDragEnd={handleDragEnd}
                      onDrop={(e) => handleDrop(e, index)}
                    >
                      {isManualMode && isAdmin && (
                        <div className="absolute top-1/2 -left-4 transform -translate-y-1/2 text-stone-300 opacity-50 group-hover:opacity-100 transition-opacity">

                    <p className={`text-xs tracking-wide ${isDraftComplete ? 'text-stone-500' : 'text-red-700'}`}>
                      {isDraftComplete
                        ? hasUnsavedChanges ? '評量已完成，請確認並同步至雲端。' : '目前矩陣已同步至最新狀態。'
                        : `尚有 ${5 - activeDimensions.filter(d => draftScores[d.key] > 0).length} 項維度未完成評量`}
                    </p>
                  </div>
                  <div className="flex items-center gap-3">
                    {existingEval && (

                    <GitMerge className="w-6 h-6 mr-3 text-orange-600" />
                    架構一致性比對
                    <span className="ml-4 px-2 py-0.5 bg-stone-100 text-stone-500 text-[10px] uppercase tracking-widest font-sans rounded-sm">Alignment Analysis</span>
                  </h3>
                  <p className="text-stone-500 text-sm max-w-3xl leading-relaxed">
                    比對「大專案」與「各子項目」的團隊均值分佈。若大專案均值遠高於子項目，可能意味著整體概念未能有效落實於局部實踐中；反之，則可能有隱藏的局部價值尚未被提昇至專案層次。

                  <span className="hidden sm:inline-block ml-4 px-2 py-0.5 bg-white border border-stone-200 text-stone-500 text-[10px] uppercase tracking-widest font-sans rounded-sm">Data Report</span>
                </h3>
                <button onClick={exportToCSV} className="flex items-center gap-1.5 text-stone-400 hover:text-orange-600 transition-colors text-[11px] uppercase tracking-widest font-medium ml-auto sm:ml-0">
                  <Download className="w-3.5 h-3.5" /> <span className="hidden sm:inline">Export</span>
                </button>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left border-collapse">
                  <thead className="bg-white text-stone-400 text-[10px] tracking-[0.15em] uppercase border-b border-stone-200">
                    <tr>
                      <th className="p-4 font-medium whitespace-nowrap">Member</th>
                      <th className="p-4 font-medium whitespace-nowrap border-l border-stone-100 text-orange-600">Main Project (25)</th>
                      {subItemsList.map(sub => <th key={sub.id} className="p-4 font-medium whitespace-nowrap border-l border-stone-100">{sub.name} (25)</th>)}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-stone-100 text-sm">
                    {MEMBERS.map(m => {
                      const mainScore = getMemberTotal(selectedProject.evaluations, m.id);
                      const subScores = subItemsList.map(sub => getMemberTotal(sub.evaluations, m.id));
                      const isCurrent = m.id === currentMemberId;
                      return (
                        <tr key={m.id} className={`transition-colors ${isCurrent ? 'bg-orange-50/30' : 'hover:bg-stone-50/50'}`}>
                          <td className="p-4 font-medium flex items-center gap-3 whitespace-nowrap text-stone-700">
                            <span className="w-2 h-2 rounded-full" style={{backgroundColor: m.color}}></span>
                            {m.name} {isCurrent && <span className="font-serif italic text-[10px] text-orange-500 ml-1">You</span>}
                          </td>
                          <td className={`p-4 font-mono text-base border-l border-stone-100 ${mainScore > 0 ? 'text-stone-800' : 'text-stone-300'}`}>{mainScore > 0 ? mainScore : '-'}</td>
                          {subScores.map((score, i) => (
                            <td key={i} className={`p-4 font-mono text-base border-l border-stone-100 ${score > 0 ? 'text-stone-600' : 'text-stone-300'}`}>{score > 0 ? score : '-'}</td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          {isAdmin && isAddingSubItem && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-sm p-8 max-w-md w-full shadow-xl border border-stone-200 animate-in zoom-in-95 duration-200">
                <h3 className="text-xl font-serif text-stone-900 mb-2 tracking-wide">新增子項目</h3>
                <p className="text-stone-500 text-sm mb-6">請為此專案輸入需要獨立評估的子項目名稱（如：主視覺、網站設計）。</p>
                <form onSubmit={confirmAddSubItem}>
                  <input autoFocus type="text" className="w-full p-3 rounded-sm bg-stone-50 border border-stone-200 focus:outline-none focus:bg-white focus:border-orange-500 transition-colors mb-6 text-stone-800 placeholder-stone-400" placeholder="輸入名稱..." value={newSubItemName} onChange={(e) => setNewSubItemName(e.target.value)} />
                  <div className="flex justify-end gap-3">
                    <button type="button" onClick={() => {setIsAddingSubItem(false); setNewSubItemName('');}} className="px-5 py-2.5 text-sm font-medium tracking-wide text-stone-500 hover:text-stone-800 transition-colors">取消</button>
                    <button type="submit" disabled={!newSubItemName.trim()} className="px-6 py-2.5 rounded-sm text-sm font-medium tracking-wide bg-orange-600 text-white hover:bg-orange-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm shadow-orange-600/20">確認新增</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {isAdmin && isEditingProject && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-sm p-8 max-w-md w-full shadow-xl border border-stone-200 animate-in zoom-in-95 duration-200">
                <h3 className="text-xl font-serif text-stone-900 mb-2 tracking-wide">編輯專案</h3>
                <p className="text-stone-500 text-sm mb-6">修改大專案的名稱與簡述。</p>
                <form onSubmit={confirmEditProject}>
                  <input autoFocus type="text" className="w-full p-3 rounded-sm bg-stone-50 border border-stone-200 focus:outline-none focus:bg-white focus:border-orange-500 transition-colors mb-4 text-stone-800 placeholder-stone-400" placeholder="專案名稱" value={editProjectData.name} onChange={(e) => setEditProjectData({ ...editProjectData, name: e.target.value })} />
                  <textarea className="w-full p-3 rounded-sm bg-stone-50 border border-stone-200 focus:outline-none focus:bg-white focus:border-orange-500 transition-colors mb-6 text-stone-800 placeholder-stone-400 resize-none" placeholder="專案簡述..." rows="3" value={editProjectData.description} onChange={(e) => setEditProjectData({ ...editProjectData, description: e.target.value })} />
                  <div className="flex justify-end gap-3">
                    <button type="button" onClick={() => setIsEditingProject(false)} className="px-5 py-2.5 text-sm font-medium tracking-wide text-stone-500 hover:text-stone-800 transition-colors">取消</button>
                    <button type="submit" disabled={!editProjectData.name.trim()} className="px-6 py-2.5 rounded-sm text-sm font-medium tracking-wide bg-orange-600 text-white hover:bg-orange-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm shadow-orange-600/20">儲存變更</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
